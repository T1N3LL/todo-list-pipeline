<http xmlns="http://www.thymeleaf.org">
    <head>
        <title>Todo List</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    </head>
    <body>
    <div class="container">
        <h2>Todo-List</h2>
        <table class="table table-bordered">
            <thead>
            <tr>
                <th>Todos</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t: ${todos}">
                <td th:text="${t.text}"></td>
                <td>
                    <a th:href="@{delete(id=${t.id})}" class="btn btn-danger">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
        <form th:action="@{add}" th:object="${todo}" method="POST">
            <div class="mb-3">
                <input type="text" th:field="*{text}" placeholder="Enter Todo"/>
            <button type="submit" class="btn btn-primary">Add</button>
            </div>
        </form>
    </div>
    </body>
</http>
