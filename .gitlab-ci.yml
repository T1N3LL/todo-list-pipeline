image: maven:3.9-eclipse-temurin-21

stages:
  - build
  - test
  - sast
  - package
  - sca-package
  - publish
  - sca-container
  - deploy
  - fuzzing
  - dast
  - bundle

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/todolist
  IMAGE_TAG: latest
  FUZZING_TARGET: "http://10.97.15.178:8080"
  DAST_TARGET: "http://10.97.15.178:8080"

build:
  stage: build
  script:
    - java -version
    - mvn -version
    - mvn clean compile

