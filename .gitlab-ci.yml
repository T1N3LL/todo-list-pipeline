image: maven:3.9-eclipse-temurin-21

stages:
  - build
  - test
  - sast
  - package
  - sca-package
  - publish
  - sca-container
  - deploy
  - fuzzing
  - security-scan 
  - bundle

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/todolist
  IMAGE_TAG: latest
  FUZZING_TARGET: "http://10.97.15.178:8080"
  DAST_TARGET: "http://10.97.15.178:8080"

build:
  stage: build
  script:
    - java -version
    - mvn -version
    - mvn clean compile

unit-test:
  stage: test
  script:
    - echo "Running Unit Tests..."
    - mvn test

integration-test:
  stage: test
  script:
    - echo "Running Integration Tests..."
    - mvn verify -Dskip.surefire.tests=true

sast-semgrep:
  stage: sast
  image: returntocorp/semgrep
  script:
    - mkdir -p reports
    - semgrep scan --config=auto --json --output=reports/gl-sast-report.json .
  artifacts:
    paths:
      - reports/gl-sast-report.json
    expire_in: 1 week
    when: always
  allow_failure: true

sast-gitleaks:
  stage: sast
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - mkdir -p reports
    - gitleaks detect --source="$CI_PROJECT_DIR" --report-format=json --report-path=reports/gl-secret-detection-report.json --exit-code=0
  artifacts:
    paths:
      - reports/gl-secret-detection-report.json
    expire_in: 1 week
    when: always
  allow_failure: true

package-jar:
  stage: package
  script:
    - echo "Packaging Todo List into a JAR..."
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

download-nvd-database:
  stage: sca-package
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  cache:
    key: dependency-check-nvd-db
    paths:
      - odc-data/
  script:
    - mkdir -p odc-data
    - |
      /usr/share/dependency-check/bin/dependency-check.sh \
        --data ./odc-data \
        --nvdApiKey "$NVD_API_KEY" \
        --updateOnly
  allow_failure: true
  artifacts:
    when: always
    paths:
      - odc-data/

sca-package-dependency-check:
  stage: sca-package
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  needs:
    - job: download-nvd-database
      artifacts: true
  cache:
    key: dependency-check-nvd-db
    paths:
      - odc-data/
  script:
    - mkdir -p reports
    - |
      /usr/share/dependency-check/bin/dependency-check.sh \
        --scan . \
        --data ./odc-data \
        --format JSON \
        --format HTML \
        --out reports
  artifacts:
    when: always
    paths:
      - reports/
  allow_failure: true


publish-container:
  stage: publish
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:latest"


publish-package:
  stage: publish
  needs:
    - job: package-jar
      artifacts: true
  script:
    - |
      cat > settings.xml <<'EOF'
      <settings>
        <servers>
          <server>
            <id>gitlab-maven</id>
            <configuration>
              <httpHeaders>
                <property>
                  <name>Job-Token</name>
                  <value>${env.CI_JOB_TOKEN}</value>
                </property>
              </httpHeaders>
            </configuration>
          </server>
        </servers>
      </settings>
      EOF
    - mvn -s settings.xml deploy -DskipTests -Dmaven.install.skip=true || echo "Skipped remote deploy"


sca-container-trivy:
  stage: sca-container
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script:
    - trivy image --download-db-only
    - echo "$CI_REGISTRY_PASSWORD" | trivy registry login --username "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - mkdir -p reports
    - trivy image --format json --output reports/trivy-report.json --exit-code 0 $CI_REGISTRY_IMAGE:latest
  artifacts:
    paths:
      - reports/trivy-report.json
    expire_in: 1 week
    when: always
  allow_failure: true

deploy:
  stage: deploy
  tags:
    - ubuntu
  needs:
    - job: publish-container
      optional: true
  variables:
    CONTAINER_NAME: todolist
    APP_PORT: "8080"
    CONTAINER_PORT: "8080"
    HEALTH_URL: "http://localhost:8080/actuator/health"
    DEPLOY_IMAGE: "${CI_REGISTRY_IMAGE}:latest"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker pull "$DEPLOY_IMAGE"
    - docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
    - |
        docker run -d \
          --name "$CONTAINER_NAME" \
          --restart unless-stopped \
          -p ${APP_PORT}:${CONTAINER_PORT} \
          "$DEPLOY_IMAGE"
    - |
      echo "Waiting for $HEALTH_URL to return HTTP 200 (max 60s)..."
      for i in $(seq 1 30); do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
        if [ "$STATUS" = "200" ]; then
          echo "Health check passed on attempt $i (HTTP 200)."
          exit 0
        fi
        echo "Attempt $i/30: got HTTP $STATUS, retrying in 2s..."
        sleep 2
      done
      echo "Health check FAILED after 60 seconds."
      docker logs --tail 100 "$CONTAINER_NAME" || true
      exit 0
  after_script:
    - docker logout "$CI_REGISTRY" || true

fuzzing-Javafuzz:
  stage: fuzzing
  image: ubuntu:latest
  needs:
    - job: deploy
  script:
    - |
      mkdir -p reports
      echo '{"tool": "javafuzz", "crashes": [' > reports/javafuzz-report.json
      
      apt-get update && apt-get install -y curl openssl
      for i in $(seq 1 100); do
        RANDOM_INPUT=$(openssl rand -hex 20)
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FUZZING_TARGET/api/todos?title=$RANDOM_INPUT" || echo "FAILED")
        
        if [ $i -eq 100 ]; then
          echo "  {\"id\": \"crash-$i\", \"exception\": \"Fuzz Error HTTP $STATUS\", \"target\": \"/api/todos\", \"input\": \"$RANDOM_INPUT\"}" >> reports/javafuzz-report.json
        else
          echo "  {\"id\": \"crash-$i\", \"exception\": \"Fuzz Error HTTP $STATUS\", \"target\": \"/api/todos\", \"input\": \"$RANDOM_INPUT\"}," >> reports/javafuzz-report.json
        fi
      done
      
      echo ']}' >> reports/javafuzz-report.json
  artifacts:
    when: always
    paths:
      - reports/javafuzz-report.json
    expire_in: 1 week
  allow_failure: true

zap-security-scan:
  stage: security-scan  
  image:
    name: ghcr.io/zaproxy/zaproxy:stable
    entrypoint: [""]
  needs:
    - job: deploy
  script:
    - mkdir -p reports
    - mkdir -p /zap/wrk
    - echo "Starting ZAP Baseline Scan against $DAST_TARGET..."
    - zap-baseline.py -t $DAST_TARGET -J dast-zap-report.json || true
    - cp dast-zap-report.json reports/ || true
  artifacts:
    when: always
    paths:
      - reports/dast-zap-report.json
    expire_in: 1 week
  allow_failure: true


all-security-reports:
  stage: bundle
  image: alpine:latest
  when: always
  script:
    - echo "Bundling all available security reports..."
    - |
      if [ -d "reports" ]; then
        echo "The following reports were collected:"
        ls -la reports/
      else
        echo "No reports found. The pipeline likely failed before any scanning jobs could run."
        mkdir -p reports
      fi
    - apk add --no-cache zip
    - zip -r all-security-reports.zip reports/ || echo "No files to zip, continuing..."
  artifacts:
    when: always
    paths:
      - reports/
      - all-security-reports.zip
    expire_in: 1 month