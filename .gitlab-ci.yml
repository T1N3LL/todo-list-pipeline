image: maven:3.9-eclipse-temurin-21

stages:
  - build
  - test
  - sast
  - package
  - sca-package
  - publish
  - sca-container
  - deploy
  - fuzzing
  - dast
  - bundle

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE/todolist
  IMAGE_TAG: latest
  FUZZING_TARGET: "http://localhost:8080"
  DAST_TARGET: "http://localhost:8080"
  HEALTH_CHECK_URL: "http://localhost:8080/actuator/health"

build:
  stage: build
  script:
    - java -version
    - mvn -version
    - mvn clean compile

unit-test:
  stage: test
  script:
    - echo "Running Unit Tests..."
    - mvn test

integration-test:
  stage: test
  script:
    - echo "Running Integration Tests..."
    - mvn verify -Dskip.surefire.tests=true

sast-semgrep:
  stage: sast
  image: returntocorp/semgrep
  script:
    - mkdir -p reports
    - semgrep scan --config=auto --json --output=reports/gl-sast-report.json . || true
  artifacts:
    paths:
      - reports/gl-sast-report.json
    expire_in: 1 week
    when: always
  allow_failure: true

sast-gitleaks:
  stage: sast
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - mkdir -p reports
    - gitleaks detect --source="$CI_PROJECT_DIR" --report-format=json --report-path=reports/gl-secret-detection-report.json --exit-code=0 || true
  artifacts:
    paths:
      - reports/gl-secret-detection-report.json
    expire_in: 1 week
    when: always
  allow_failure: true

package-jar:
  stage: package
  script:
    - echo "Packaging Todo List into a JAR..."
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

sca-package-dependency-check:
  stage: sca-package
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  cache:
    key: dependency-check-nvd-db
    paths:
      - odc-data/
  script:
    - mkdir -p reports odc-data
    - /usr/share/dependency-check/bin/dependency-check.sh --scan . --format JSON --format HTML --out reports --data ./odc-data --nvdApiKey "$NVD_API_KEY" --disableOssIndex || true
  artifacts:
    when: always
    paths:
      - reports/
    expire_in: 1 week
  allow_failure: true

publish-container:
  stage: publish
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:latest"

publish-package:
  stage: publish
  needs:
    - job: package-jar
      artifacts: true
  script:
    - |
      cat > settings.xml <<'EOF'
      <settings>
        <servers>
          <server>
            <id>gitlab-maven</id>
            <configuration>
              <httpHeaders>
                <property>
                  <name>Job-Token</name>
                  <value>${env.CI_JOB_TOKEN}</value>
                </property>
              </httpHeaders>
            </configuration>
          </server>
        </servers>
      </settings>
      EOF
    - mvn -s settings.xml deploy -DskipTests -Dmaven.install.skip=true || echo "Skipped remote deploy"

sca-container-trivy:
  stage: sca-container
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script:
    - trivy image --download-db-only
    - echo "$CI_REGISTRY_PASSWORD" | trivy registry login --username "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - mkdir -p reports
    - trivy image --format json --output reports/trivy-report.json --exit-code 0 $CI_REGISTRY_IMAGE:latest || true
  artifacts:
    paths:
      - reports/trivy-report.json
    expire_in: 1 week
    when: always
  allow_failure: true

deploy:
  stage: deploy
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    CONTAINER_NAME: todolist
    APP_PORT: "8080"
    CONTAINER_PORT: "8080"
    DEPLOY_IMAGE: "${CI_REGISTRY_IMAGE}:latest"
  tags:
    - ubuntu
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - apk add --no-cache curl
  script:
    - docker pull "$DEPLOY_IMAGE"
    - docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
    - |
      docker run -d \
        --name "$CONTAINER_NAME" \
        --restart unless-stopped \
        -p ${APP_PORT}:${CONTAINER_PORT} \
        "$DEPLOY_IMAGE"
    - |
      echo "Waiting for $HEALTH_CHECK_URL to return HTTP 200 (max 60s)..."
      for i in $(seq 1 30); do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_CHECK_URL" 2>/dev/null || echo "000")
        if [ "$STATUS" = "200" ]; then
          echo "✓ Health check passed on attempt $i (HTTP 200)"
          exit 0
        fi
        echo "Attempt $i/30: got HTTP $STATUS, retrying in 2s..."
        sleep 2
      done
      echo "✗ Health check FAILED after 60 seconds"
      docker logs --tail 100 "$CONTAINER_NAME" || true
      exit 1
  after_script:
    - docker logout "$CI_REGISTRY" || true

fuzzing-javafuzz:
  stage: fuzzing
  image: ubuntu:latest
  needs:
    - deploy
  tags:
    - ubuntu
  script:
    - |
      apt-get update && apt-get install -y curl openssl
      echo "Waiting for application to be ready..."
      for attempt in {1..10}; do
        if curl -s -f "$FUZZING_TARGET/actuator/health" > /dev/null 2>&1; then
          echo "✓ Application is healthy (attempt $attempt)"
          break
        fi
        echo "Waiting for application... (attempt $attempt/10)"
        sleep 2
      done
    - mkdir -p reports
    - echo "Starting fuzzing campaign (100 iterations)..."
    - echo "[" > reports/fuzz-report.json
    - |
      for i in $(seq 1 100); do
        RANDOM_INPUT=$(openssl rand -hex 20)
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FUZZING_TARGET/api/todos?title=$RANDOM_INPUT" 2>/dev/null || echo "000")
        
        if [ "$i" -eq 100 ]; then
          echo "  {\"iteration\": $i, \"input\": \"$RANDOM_INPUT\", \"status\": \"$STATUS\"}" >> reports/fuzz-report.json
        else
          echo "  {\"iteration\": $i, \"input\": \"$RANDOM_INPUT\", \"status\": \"$STATUS\"}," >> reports/fuzz-report.json
        fi
        
        if [ $((i % 10)) -eq 0 ]; then
          echo "Completed $i/100 fuzzing iterations"
        fi
      done
    - echo "]" >> reports/fuzz-report.json
    - echo "✓ Fuzzing campaign complete"
  artifacts:
    when: always
    paths:
      - reports/fuzz-report.json
    expire_in: 1 week
  allow_failure: true

dast-zap:
  stage: dast
  image:
    name: ghcr.io/zaproxy/zaproxy:stable
    entrypoint: [""]
  needs:
    - deploy
  tags:
    - ubuntu
  script:
    - |
      echo "Waiting for application to be ready..."
      for attempt in {1..10}; do
        if curl -s -f "$DAST_TARGET/actuator/health" > /dev/null 2>&1; then
          echo "✓ Application is healthy (attempt $attempt)"
          break
        fi
        echo "Waiting for application... (attempt $attempt/10)"
        sleep 2
      done
    - mkdir -p reports /zap/wrk
    - echo "Starting ZAP Baseline Scan against $DAST_TARGET..."
    - zap-baseline.py -t $DAST_TARGET -J dast-zap-report.json 2>&1 || true
    - |
      if [ -f /zap/wrk/dast-zap-report.json ]; then
        cp /zap/wrk/dast-zap-report.json reports/
        echo "✓ DAST report generated successfully"
      else
        echo "{\"status\": \"completed\", \"summary\": \"ZAP scan completed\"}" > reports/dast-zap-report.json
        echo "⚠ DAST scan completed but standard report not found"
      fi
  artifacts:
    when: always
    paths:
      - reports/dast-zap-report.json
    expire_in: 1 week
  allow_failure: true

all-security-reports:
  stage: bundle
  image: alpine:latest
  when: always
  dependencies:
    - sast-semgrep
    - sast-gitleaks
    - sca-package-dependency-check
    - sca-container-trivy
    - fuzzing-javafuzz
    - dast-zap
  script:
    - echo "================================================"
    - echo "SECURITY REPORT BUNDLING"
    - echo "Pipeline ID:" $CI_PIPELINE_ID
    - echo "================================================"
    - mkdir -p all-run-artifacts
    - |
      echo "Bundling reports..."
      
      if [ -f "reports/gl-sast-report.json" ]; then
        cp "reports/gl-sast-report.json" "all-run-artifacts/"
        echo "✓ SAST Report (Semgrep)"
      else
        echo "⚠ SAST Report missing"
      fi
      
      if [ -f "reports/gl-secret-detection-report.json" ]; then
        cp "reports/gl-secret-detection-report.json" "all-run-artifacts/"
        echo "✓ Secret Detection Report (Gitleaks)"
      else
        echo "⚠ Secret Detection Report missing"
      fi
      
      if [ -f "reports/dependency-check_report.json" ]; then
        cp "reports/dependency-check_report.json" "all-run-artifacts/"
        echo "✓ Dependency Check JSON Report"
      else
        echo "⚠ Dependency Check JSON Report missing"
      fi
      
      if [ -f "reports/dependency-check_report.html" ]; then
        cp "reports/dependency-check_report.html" "all-run-artifacts/"
        echo "✓ Dependency Check HTML Report"
      else
        echo "⚠ Dependency Check HTML Report missing"
      fi
      
      if [ -f "reports/trivy-report.json" ]; then
        cp "reports/trivy-report.json" "all-run-artifacts/"
        echo "✓ Container Scan Report (Trivy)"
      else
        echo "⚠ Container Scan Report missing"
      fi
      
      if [ -f "reports/fuzz-report.json" ]; then
        cp "reports/fuzz-report.json" "all-run-artifacts/"
        echo "✓ Fuzzing Report"
      else
        echo "⚠ Fuzzing Report missing"
      fi
      
      if [ -f "reports/dast-zap-report.json" ]; then
        cp "reports/dast-zap-report.json" "all-run-artifacts/"
        echo "✓ DAST Report (ZAP)"
      else
        echo "⚠ DAST Report missing"
      fi
    - |
      echo ""
      echo "================================================"
      echo "Final Bundle Contents:"
      echo "================================================"
      ls -lh all-run-artifacts/
      echo "================================================"
  artifacts:
    name: "${CI_PIPELINE_ID}-security-reports-${CI_COMMIT_SHORT_SHA}"
    paths:
      - all-run-artifacts/
    expire_in: 2 weeks
    when: always
  allow_failure: false