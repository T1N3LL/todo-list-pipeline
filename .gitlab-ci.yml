stages:
  - build
  - package
  - test
  - publish
  - deploy

test-job:
  script:
    - echo "Group runner works!"


build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn clean compile

package:
  stage: package
  image: maven:3.9-eclipse-temurin-17
  script:
    - echo " Packaging Todo List into a JAR..."
    - mvn package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour